<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ比較</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { width: 100%; }
        h1 { text-align: center; font-size: 18px; margin-bottom: 15px; }

        /* スクロールや固定を一切排除した表の設定 */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            font-size: 12px;
            table-layout: auto; /* コンテンツに合わせて幅を調整 */
        }

        th, td { 
            border: 1px solid #ccc; 
            padding: 8px 4px; 
            text-align: center; 
            vertical-align: middle;
        }

        /* A列（項目名）のスタイル：固定を解除 */
        .row-label { 
            background-color: #555; 
            color: white; 
            font-weight: bold;
            width: 70px; /* 項目名の幅を少し確保 */
        }

        tr:nth-child(even) { background-color: #f9f9f9; }

        /* 画像の設定 */
        img { 
            width: 100%; 
            max-width: 80px; 
            height: auto; 
            display: block; 
            margin: auto; 
        }

        .btn-link { 
            color: #0066cc; 
            text-decoration: none; 
            font-size: 11px;
            border-bottom: 1px solid #0066cc;
        }

        .loading { text-align: center; padding: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>スマホスペック比較</h1>
        <div id="loading" class="loading">データを読み込み中...</div>
        <table id="spec-table" style="display: none;">
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwycU-w3bFlYiMjI1v0qn5lSe703M54eBgxJUUyU0KpUn5yTp-qzPLozhzW9YgpUjoS/exec";

        async function fetchData() {
            try {
                const response = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
                const data = await response.json();
                renderTable(data);
            } catch (error) {
                document.getElementById('loading').innerText = "読み込みエラー";
            }
        }

        function renderTable(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = "";

            data.forEach((row) => {
                const tr = document.createElement('tr');
                const rowHeaderName = String(row[0]).trim();

                row.forEach((cellValue, index) => {
                    // 全ての行・列において sticky（固定）の設定はしていません
                    const td = document.createElement(index === 0 ? 'th' : 'td');
                    if (index === 0) td.className = "row-label";

                    const val = cellValue ? String(cellValue).trim() : "";

                    if (index === 0) {
                        td.textContent = val;
                    } 
                    else if (rowHeaderName.includes("画像") && val.startsWith("http")) {
                        td.innerHTML = `<img src="${val}" alt="img">`;
                    } 
                    else if (val.startsWith("http")) {
                        td.innerHTML = `<a href="${val}" target="_blank" rel="noopener" class="btn-link">詳細</a>`;
                    } 
                    else {
                        td.textContent = val;
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('spec-table').style.display = 'table';
        }

        fetchData();
    </script>
</body>
</html>
