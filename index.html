<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ比較サイト</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; background: white; table-layout: auto; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #444; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        img { max-width: 100px; max-height: 100px; object-fit: contain; }
        .loading { text-align: center; padding: 50px; font-weight: bold; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>スマホスペック比較表</h1>
        <div id="loading" class="loading">最新データを取得中...</div>
        <table id="spec-table" style="display: none;">
            <thead><tr id="table-header"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwycU-w3bFlYiMjI1v0qn5lSe703M54eBgxJUUyU0KpUn5yTp-qzPLozhzW9YgpUjoS/exec";

        async function fetchData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                renderTable(data);
            } catch (error) {
                document.getElementById('loading').innerText = "データの読み込みに失敗しました。URLとデプロイ設定を確認してください。";
            }
        }

        function renderTable(data) {
            if (data.length === 0) return;
            const headerRow = document.getElementById('table-header');
            const body = document.getElementById('table-body');
            const keys = Object.keys(data[0]);

            keys.forEach(key => {
                const th = document.createElement('th');
                th.textContent = key;
                headerRow.appendChild(th);
            });

            data.forEach(item => {
                const tr = document.createElement('tr');
                keys.forEach(key => {
                    const td = document.createElement('td');
                    const val = item[key];

                    // 「画像」という文字が含まれる列、またはURLが画像形式の場合
                    if ((key.includes("画像") || key.includes("写真")) && String(val).startsWith("http")) {
                        td.innerHTML = `<img src="${val}" alt="端末画像">`;
                    } 
                    // URLの場合（httpから始まる）
                    else if (String(val).startsWith("http")) {
                        td.innerHTML = `<a href="${val}" target="_blank" rel="noopener">リンク</a>`;
                    } 
                    else {
                        td.textContent = val;
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('spec-table').style.display = 'table';
        }

        fetchData();
    </script>
</body>
</html>
