<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ比較</title>
    <style>
        /* 全体の余白をゼロにする */
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 5px; color: #333; line-height: 1.2; }
        .container { width: 100%; margin: 0 auto; }
        h1 { text-align: center; font-size: 16px; margin: 5px 0; }

        /* 表のレイアウト設定：画面幅いっぱいに固定 */
        table { 
            width: 100%; 
            table-layout: fixed; /* 列の幅を強制固定 */
            border-collapse: collapse; 
            background: white; 
            font-size: 11px; /* 文字を小さくして収める */
        }

        th, td { 
            border: 1px solid #ccc; 
            padding: 4px 2px; 
            text-align: center; 
            vertical-align: middle;
            word-break: break-all; /* 長い単語で枠が広がらないようにする */
            overflow: hidden;
        }

        /* A列（項目名）の幅を狭く固定 */
        .row-label { 
            background-color: #444; 
            color: white; 
            font-weight: bold; 
            width: 50px; /* 項目名は最小限に */
        }

        tr:nth-child(even) { background-color: #f9f9f9; }

        /* 画像サイズを劇的に小さくして一画面に収める */
        img { 
            width: 100%; 
            max-width: 60px; /* 3-4列並んでも大丈夫なサイズ */
            height: auto; 
            display: block; 
            margin: auto; 
        }

        /* ボタンも最小限のサイズに */
        .btn-link { 
            color: #0066cc; 
            text-decoration: underline; 
            font-size: 10px;
        }

        .loading { text-align: center; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>スマホスペック比較</h1>
        <div id="loading" class="loading">読込中...</div>
        <table id="spec-table" style="display: none;">
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwycU-w3bFlYiMjI1v0qn5lSe703M54eBgxJUUyU0KpUn5yTp-qzPLozhzW9YgpUjoS/exec";

        async function fetchData() {
            try {
                const response = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
                const data = await response.json();
                renderTable(data);
            } catch (error) {
                document.getElementById('loading').innerText = "エラー";
            }
        }

        function renderTable(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = "";

            data.forEach((row) => {
                const tr = document.createElement('tr');
                const rowHeaderName = String(row[0]).trim();

                row.forEach((cellValue, index) => {
                    const td = document.createElement(index === 0 ? 'th' : 'td');
                    if (index === 0) td.className = "row-label";

                    const val = cellValue ? String(cellValue).trim() : "";

                    if (index === 0) {
                        td.textContent = val;
                    } 
                    else if (rowHeaderName.includes("画像") && val.startsWith("http")) {
                        td.innerHTML = `<img src="${val}" alt="img">`;
                    } 
                    else if (val.startsWith("http")) {
                        td.innerHTML = `<a href="${val}" target="_blank" rel="noopener" class="btn-link">詳細</a>`;
                    } 
                    else {
                        td.textContent = val;
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('spec-table').style.display = 'table';
        }

        fetchData();
    </script>
</body>
</html>
