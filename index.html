<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ比較</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; color: #333; }
        h1 { text-align: center; font-size: 1.2rem; margin: 10px 0; color: #1a1a1a; }
        
        /* カード全体のコンテナ */
        #card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            max-width: 800px;
            margin: auto;
        }

        /* 端末ごとのカードスタイル */
        .card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 画像エリア */
        .img-wrapper {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            background: #fff;
        }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* スペック情報エリア */
        .spec-list { width: 100%; font-size: 0.8rem; }
        .spec-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding: 4px 0;
        }
        .spec-label { color: #777; font-weight: bold; margin-right: 5px; flex-shrink: 0; }
        .spec-value { text-align: right; word-break: break-all; }

        /* ボタン */
        .btn-link {
            display: block;
            width: 100%;
            text-align: center;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 0;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.8rem;
        }

        .loading { text-align: center; padding: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>スマホ比較表</h1>
    <div id="loading" class="loading">読込中...</div>
    <div id="card-container"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwycU-w3bFlYiMjI1v0qn5lSe703M54eBgxJUUyU0KpUn5yTp-qzPLozhzW9YgpUjoS/exec";

        async function fetchData() {
            try {
                const response = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
                const data = await response.json();
                renderCards(data);
            } catch (error) {
                document.getElementById('loading').innerText = "エラーが発生しました。";
            }
        }

        function renderCards(data) {
            const container = document.getElementById('card-container');
            const rowCount = data.length; // 行数
            const colCount = data[0].length; // 列数（端末数+1）

            // 端末の数だけカードを作成（1列目はラベルなので index=1 から開始）
            for (let j = 1; j < colCount; j++) {
                const card = document.createElement('div');
                card.className = 'card';

                const specList = document.createElement('div');
                specList.className = 'spec-list';

                let imgHtml = "";
                let btnHtml = "";

                // スプレッドシートの各行をループ
                for (let i = 0; i < rowCount; i++) {
                    const label = String(data[i][0]).trim(); // A列の見出し
                    const value = data[i][j] ? String(data[i][j]).trim() : "-";

                    if (label.includes("画像") && value.startsWith("http")) {
                        imgHtml = `<div class="img-wrapper"><img src="${value}" alt="phone"></div>`;
                    } else if (value.startsWith("http")) {
                        btnHtml = `<a href="${value}" target="_blank" rel="noopener" class="btn-link">詳細・購入</a>`;
                    } else {
                        // 通常のテキスト情報
                        specList.innerHTML += `
                            <div class="spec-item">
                                <span class="spec-label">${label}</span>
                                <span class="spec-value">${value}</span>
                            </div>`;
                    }
                }

                card.innerHTML = imgHtml;
                card.appendChild(specList);
                if (btnHtml) card.innerHTML += btnHtml;
                
                container.appendChild(card);
            }

            document.getElementById('loading').style.display = 'none';
        }

        fetchData();
    </script>
</body>
</html>
